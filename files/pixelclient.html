<html>

<script>
  window.loaderConfig = {
    assetName: "clpixelclient",
    assetParts: 2
  };
</script>

<style>
body {
  background: rgb(30,30,30);
  overflow: hidden;
  margin: 0;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  height: 100vh;
}

h1 {
  color: white;
  font-family: Arial;
  font-size: 2.5rem;
}
</style>

<div class="container">
  <h1>Loading [...]</h1>
</div>

<script>

const CDN_BASE = "https://cdn.jsdelivr.net/gh/Zotronix/egc@main/assets/";

async function fetchWithProgress(url) {
  const label = document.querySelector("h1");
  label.textContent = `Loading [${url.replace(CDN_BASE, "")}]`;

  const response = await fetch(url);
  if (!response.ok) throw new Error("Failed to fetch " + url);

  const reader = response.body.getReader();
  const chunks = [];
  let received = 0;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    received += value.length;
    chunks.push(value);
  }

  const buffer = new Uint8Array(received);
  let offset = 0;

  for (const chunk of chunks) {
    buffer.set(chunk, offset);
    offset += chunk.length;
  }

  return buffer.buffer;
}

async function mergeFiles(parts) {
  const buffers = await Promise.all(parts.map(fetchWithProgress));
  return URL.createObjectURL(new Blob(buffers));
}

async function initLaunch() {
  const { assetName, assetParts } = window.loaderConfig;
  const parts = [];

  for (let i = 1; i <= assetParts; i++) {
    parts.push(`${CDN_BASE}${assetName}.html.part${i}.bin`);
  }

  const mergedUrl = await mergeFiles(parts);

  document.querySelector("h1").textContent = "Launching...";

  const response = await fetch(mergedUrl);
  const text = await response.text();

  document.open();
  document.write(text);
  document.close();
}

window.addEventListener("load", initLaunch);

</script>

</html>
