<html>

<script>
  window.loaderConfig = {
    assetName: "clprismclient",
    assetParts: 2
  }
</script>

<style>
body {
  background: rgb(30,30,30);
  overflow: hidden;
  margin: 0;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  height: 100vh;
}

h1 {
  color: white;
  font-family: Arial;
  font-size: 2.5rem;
}
</style>

<div class="container">
  <h1>Loading [...]</h1>
</div>

<script>

const CDN_BASE = "https://cdn.jsdelivr.net/gh/Zotronix/egc@main/assets/";

async function fetchWithProgress(url) {
  document.querySelector("h1").textContent =
    `Loading [${url.replace(CDN_BASE, "")}]`;

  const response = await fetch(url);
  const reader = response.body.getReader();
  let chunks = [];
  let received = 0;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    received += value.length;
    chunks.push(value);
  }

  let fullBuffer = new Uint8Array(received);
  let offset = 0;

  for (let chunk of chunks) {
    fullBuffer.set(chunk, offset);
    offset += chunk.length;
  }

  return fullBuffer.buffer;
}

async function mergeFiles(parts) {
  const buffers = await Promise.all(parts.map(fetchWithProgress));
  const mergedBlob = new Blob(buffers);
  return URL.createObjectURL(mergedBlob);
}

async function initLaunch() {
  const config = window.loaderConfig;
  let parts = [];

  for (let i = 1; i <= config.assetParts; i++) {
    parts.push(
      `${CDN_BASE}${config.assetName}.html.part${i}.bin`
    );
  }

  const mergedUrl = await mergeFiles(parts);

  document.querySelector("h1").textContent = "Launching...";

  const response = await fetch(mergedUrl);
  const text = await response.text();

  document.open();
  document.write(text);
  document.close();
}

window.addEventListener("load", initLaunch);

</script>

</html>
